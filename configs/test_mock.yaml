# Test configuration using mock provider (no API keys needed)

description: "Test run with mock model"

rollout_model:
  provider: mock
  name: mock-model

monitor_model:
  provider: mock
  name: mock-model

sft_model:
  hf_model_id: meta-llama/Meta-Llama-3.1-8B-Instruct
  output_dir: data/sft_models

